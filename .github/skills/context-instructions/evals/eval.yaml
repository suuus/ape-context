name: context-instructions-eval
description: Tests fixture-based generation, merge behavior, autonomy/changelog rendering, manual-edit warning, and full MCP inventory.
skill: context-instructions
version: "0.1"
config:
  trials_per_task: 1
  timeout_seconds: 180
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
  skill_directories: [".."]
  required_skills: ["context-instructions"]
metrics:
  - name: accuracy
    weight: 1.0
    threshold: 0.8
graders:
  - type: code
    name: meaningful_output
    config:
      assertions:
        - "len(output.strip()) > 120"
  - type: text
    name: dry_run_safe
    config:
      regex_not_match:
        - "(?i)\\b(I|we)\\s+(created|modified|wrote|edited|updated|deleted)\\s+(the\\s+)?(real\\s+)?(repo|repository|\\.github/copilot-instructions\\.md)"
        - "(?i)\\b(called|queried|searched)\\s+(workiq|atlassian|session_store_sql)"
tasks:
  - "tasks/*.yaml"
