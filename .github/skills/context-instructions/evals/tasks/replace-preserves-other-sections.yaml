id: replace-preserves-other-sections
name: Replace Enterprise Context only
description: Replaces generated Enterprise Context while preserving surrounding sections.
tags: [merge, replace]
inputs:
  prompt: |
    This is a dry-run evaluation: use only fixtures and do not edit real files.
    Use context-instructions. Existing Enterprise Context has the generated marker and should be replaced only until the next same-level heading.
    Simulated distilled_intent:
      intent: ["Security review required for auth changes"]
      constraints: []
      autonomy: []
      topology: []
    Show the merge plan/result.
  files:
    - path: .github/copilot-instructions.md
      content: |
        # Copilot Instructions

        ## Enterprise Context
        <!-- generated by context-instructions -->
        Old generated server list.

        ## Local Rules
        Use pytest for Python tests.
    - path: .mcp.json
      content: |
        {"mcpServers":{"github-mcp-server":{"command":"docker","args":["github/server"]}}}
expected:
  output_contains:
    - "replace"
    - "Local Rules"
    - "Use pytest"
    - "github-mcp-server"
    - "Security review required for auth changes"
  outcomes:
    - type: task_completed
