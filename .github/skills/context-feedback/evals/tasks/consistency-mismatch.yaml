id: consistency-mismatch
name: Detect instructions versus MCP mismatch
description: Ensures validation flags missing and extra server references before commit.
tags:
  - validation
inputs:
  prompt: |
    This is a dry-run evaluation. Use only eval workspace fixtures and do not edit files, create issues, commit, or push.
    Use context-feedback to validate artifacts. If validation issues exist, list them and state that you must ask whether to fix before any commit.
    Include the exact phrase "before commit" in the validation warning.
    healthcheck_results={"github-mcp-server":{"status":"connected","detail":"ok"}}
    tagged_doc_sources=[]
    distilled_intent={"intent":[],"constraints":[],"autonomy":[]}
  files:
    - path: .mcp.json
      content: |
        {"mcpServers":{"github-mcp-server":{"tools":["*"]},"atlassian-jira":{"tools":["get_issue"]}}}
    - path: .github/copilot-instructions.md
      content: |
        # Copilot Instructions
        ## Enterprise Context
        github-mcp-server is documented.
        microsoft-365 is documented.
expected:
  output_contains:
    - "atlassian-jira"
    - "microsoft-365"
    - "validation"
    - "ask"
    - "commit"
  outcomes:
    - type: task_completed
