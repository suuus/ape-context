name: context-distill-eval
description: Tests dry-run distillation from documentation and history contracts, autonomy defaults, changelog diffing, and no-fabrication behavior.
skill: context-distill
version: "0.1"
config:
  trials_per_task: 1
  timeout_seconds: 180
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
  skill_directories:
    - ".."
  required_skills:
    - context-distill
metrics:
  - name: accuracy
    weight: 1.0
    threshold: 0.8
graders:
  - type: code
    name: meaningful_output
    config:
      assertions:
        - "len(output.strip()) > 120"
  - type: text
    name: dry_run_safe
    config:
      regex_not_match:
        - "(?i)\\b(I|we)\\s+(called|queried|searched)\\s+(workiq|atlassian|session_store_sql|live|real)"
        - "(?i)\\b(I|we)\\s+(created|modified|wrote|edited)\\s+\\.github/intent-changelog\\.md"
tasks:
  - "tasks/*.yaml"
